databases:
  - name: lasafricanas-postgres
    databaseName: lasafricanas
    user: lasafricanas
    plan: free

services:
  - type: web
    name: lasafricanas-backend
    runtime: docker
    rootDir: backend
    plan: free
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: lasafricanas-backend.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://lasafricanas-frontend.onrender.com,https://lasafricanas-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://lasafricanas-frontend.onrender.com
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: lasafricanas-postgres
          property: connectionString

  - type: web
    name: lasafricanas-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://lasafricanas-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
